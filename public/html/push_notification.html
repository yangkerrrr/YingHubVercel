<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Push Notification Admin</title>
    <link rel="stylesheet" href="/css/main.css" />
    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <main style="max-width:700px;margin:40px auto;padding:20px;">
      <h1>Push Notification Admin</h1>

      <div id="access">
        <label>Enter secret code to unlock:</label>
        <input id="admin-code" type="password" style="width:100%;padding:8px;margin-top:8px;" />
        <button id="unlock" style="margin-top:10px;">Unlock</button>
      </div>

      <div id="admin-ui" style="display:none; margin-top:20px;">
        <label>Title (optional)</label>
        <input id="notif-title" type="text" style="width:100%;padding:8px;" />

        <label style="margin-top:10px;display:block;">Message</label>
        <textarea id="notif-message" rows="4" style="width:100%;padding:8px;"></textarea>

        <button id="send-notif" style="margin-top:10px;">Send to all subscribers</button>

        <p style="margin-top:12px;color:#666;font-size:0.9em;">This will POST to the secret notify endpoint on the server. The server enforces the secret path.</p>
      </div>

      <script src="/js/push_admin.js"></script>
    </main>
  </body>
</html>
